<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Context budget by route</title>
  <desc id="desc">A route-based context budget diagram for FAST, STANDARD, and DEEP paths in Argis.</desc>
  <rect width="1200" height="520" rx="28" fill="#F7F4EE"/>
  <rect x="52" y="62" width="262" height="376" rx="24" fill="#FFFDF9" stroke="#7F8C8D" stroke-width="2"/>
  <rect x="364" y="62" width="262" height="376" rx="24" fill="#FFFDF9" stroke="#9B7A4D" stroke-width="2"/>
